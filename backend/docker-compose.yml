version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URL=mongodb://mongodb:27017/business_empire
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_access_key_must_be_changed
      - JWT_REFRESH_SECRET=production_refresh_key_must_be_changed
    depends_on:
      - mongodb
      - redis
    restart: always

  mongodb:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: always

volumes:
  mongo-data:
  redis-data:
